<div class="container-fluid">
    <h4>Comfort Temperature Control</h4>
    <div class="form-inline">
        <div class="form-group">
            <label for="dashboard-comfort-temp">Temperature:</label>
            <input type="number" class="form-control" id="dashboard-comfort-temp" placeholder="Enter temperature">
        </div>
        <button type="button" class="btn btn-primary" data-bind="click: setComfortTemperature">Set Temperature</button>
    </div>
    <div id="dashboard-comfort-alert" class="alert" style="display: none; margin-top: 10px;"></div>
</div>
