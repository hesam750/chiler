<div class="modal fade" id="comfort-modal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title">Set Comfort Temperature</h4>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="modal-comfort-temp">Comfort Temperature</label>
                    <input type="number" class="form-control" id="modal-comfort-temp" value="22.0" step="0.5">
                </div>
                <div id="modal-comfort-alert" class="alert" role="alert" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" data-bind="click: setComfortTemperature">Set Comfort</button>
            </div>
        </div>
    </div>
</div>
